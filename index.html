<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>QuantumSrc — Build the Future</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; color: #00ff88; font-family: 'IBM Plex Mono', 'Courier New', monospace; font-size: 13px; }

    /* ========== DESKTOP: 2-column (sidebar | main) ========== */
    #app {
      display: grid;
      grid-template-columns: 240px 1fr;
      grid-template-rows: 1fr;
      width: 100vw;
      height: 100vh;
    }

    /* --- Mobile Tab Bar (hidden on desktop) --- */
    #tab-bar {
      display: none;
      background: #060610;
      border-bottom: 1px solid #1a3a2a;
      flex-shrink: 0;
    }
    #tab-bar button {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #336655;
      font-family: inherit;
      font-size: 12px;
      padding: 10px 0;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.15s, border-color 0.15s;
    }
    #tab-bar button.active { color: #00ff88; border-bottom-color: #00ff88; }
    #tab-bar button:hover { color: #00ff88; }

    /* --- Left Sidebar --- */
    #sidebar {
      background: #0d0d18;
      border-right: 1px solid #1a3a2a;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0;
      position: relative;
      min-width: 240px;
    }
    .sb-header {
      background: #060610;
      padding: 10px 12px;
      border-bottom: 1px solid #1a3a2a;
      font-size: 16px;
      font-weight: bold;
      color: #00ff88;
      letter-spacing: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .sb-settings-btn {
      background: none;
      border: 1px solid #1a3a2a;
      color: #668877;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 3px;
      line-height: 1;
    }
    .sb-settings-btn:hover { color: #00ff88; border-color: #00ff88; }

    .sb-tabs {
      display: flex;
      background: #060610;
      border-bottom: 1px solid #1a3a2a;
      flex-shrink: 0;
    }
    .sb-tab {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #446655;
      font-family: inherit;
      font-size: 12px;
      padding: 8px 4px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: color 0.15s, border-color 0.15s;
    }
    .sb-tab:hover { color: #88bbaa; }
    .sb-tab.active { color: #00ff88; border-bottom-color: #00ff88; }

    .sb-tab-content {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #1a3a2a #0d0d18;
    }

    .sb-resize-handle {
      position: absolute;
      top: 0;
      right: -3px;
      width: 6px;
      height: 100%;
      cursor: col-resize;
      z-index: 10;
    }
    .sb-resize-handle:hover { background: #00ff8833; }
    .sb-section {
      padding: 8px 12px;
      border-bottom: 1px solid #0f1f18;
    }
    .sb-section h3 {
      font-size: 12px;
      font-family: 'Lato', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #336655;
      margin-bottom: 6px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      font-size: 12px;
      color: #668877;
    }
    .stat-row .val { color: #00ff88; font-weight: bold; }
    .stat-row .val.money { color: #44dd88; }
    .stat-row .val.energy { color: #ffaa22; }
    .stat-row .val.era { color: #6688ff; }

    .stock-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 12px;
      color: #668877;
    }
    .stock-row .sym { color: #88bbaa; font-weight: bold; width: 55px; flex-shrink: 0; }

    /* Hoverable/tappable stock tag with tooltip */
    .stock-tag {
      position: relative;
      cursor: help;
      background: #0a1a15;
      border: 1px solid #1a3a2a;
      border-radius: 3px;
      padding: 0 4px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.5px;
      transition: border-color 0.15s, background 0.15s;
    }
    .stock-tag:hover {
      border-color: #00ff88;
      background: #0f2a1a;
    }
    .stock-tooltip {
      position: fixed;
      background: #0a0a18;
      border: 1px solid #00ff88;
      border-radius: 4px;
      padding: 8px 10px;
      color: #aaccbb;
      font-size: 12px;
      font-family: 'Lato', sans-serif;
      font-weight: normal;
      line-height: 1.4;
      white-space: pre-wrap;
      width: 240px;
      z-index: 10000;
      pointer-events: none;
      box-shadow: 0 2px 12px rgba(0, 255, 136, 0.15);
    }
    .stock-row .price { color: #44dd88; text-align: right; flex: 1; font-weight: bold; }
    .stock-row .change { text-align: right; width: 60px; font-size: 12px; font-weight: bold; }
    .stock-row .change.up { color: #00ff88; }
    .stock-row .change.down { color: #ff5555; }

    .sidebar-btn {
      display: block;
      width: 100%;
      background: #0a1a12;
      border: 1px solid #1a3a2a;
      color: #00ff88;
      padding: 7px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      text-align: left;
      border-radius: 3px;
      margin-bottom: 4px;
      transition: background 0.15s, border-color 0.15s;
    }
    .sidebar-btn:hover { background: #0f2a1a; border-color: #00ff88; }
    .sidebar-btn:active { background: #1a4a2a; }

    .research-btn { font-size: 12px; position: relative; }
    .research-btn .cost { color: #ffaa22; float: right; }
    .research-btn .year-advance { display: block; font-size: 12px; color: #6688ff; margin-top: 2px; }
    .research-done { font-size: 12px; color: #334455; padding: 2px 0; }
    .research-locked { font-size: 12px; color: #1a2a22; padding: 2px 0; }

    /* News modal */
    #news-modal, #settings-modal { position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;display:flex;align-items:center;justify-content:center; }
    .nm-backdrop { position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85); }
    .nm-content { position:relative;width:95%;max-width:700px;height:80%;background:#0a0a18;border:1px solid #1a3a2a;border-radius:8px;display:flex;flex-direction:column;overflow:hidden; }
    .nm-header { display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#060610;border-bottom:1px solid #1a3a2a;color:#6688ff;font-size:14px;font-weight:bold;font-family:'Lato',sans-serif;letter-spacing:0.5px; }
    .nm-close { background:none;border:none;color:#668877;font-size:24px;cursor:pointer;font-family:inherit; }
    .nm-close:hover { color:#ff5555; }
    .nm-body { flex:1;overflow-y:auto;padding:8px 0; }
    .news-modal-item { padding:10px 16px;border-bottom:1px solid #0f1f18; }
    .news-modal-headline { font-size:13px;color:#aaccbb;font-family:'Lato',sans-serif;line-height:1.4;margin-bottom:4px; }
    .news-modal-meta { display:flex;gap:12px;font-size:12px;color:#668877;margin-bottom:6px;flex-wrap:wrap;align-items:center; }
    .news-modal-impacts { display:flex;flex-wrap:wrap;gap:6px; }
    .news-stock-impact { font-size:12px;background:#0a1a15;border:1px solid #1a3a2a;border-radius:3px;padding:2px 6px;display:inline-flex;align-items:center;gap:4px; }

    /* Bracket modal */
    #bracket-modal { position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;display:flex;align-items:center;justify-content:center; }
    .bk-backdrop { position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85); }
    .bk-content { position:relative;width:95%;max-width:950px;height:85%;background:#0a0a18;border:1px solid #1a3a2a;border-radius:8px;display:flex;flex-direction:column;overflow:hidden; }
    .bk-header { display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#060610;border-bottom:1px solid #1a3a2a;color:#00ff88;font-size:13px;font-weight:bold;letter-spacing:1px; }
    .bk-phase { font-size:12px;letter-spacing:0.5px;color:#6688ff; }
    .bk-close { background:none;border:none;color:#668877;font-size:24px;cursor:pointer;font-family:inherit; }
    .bk-close:hover { color:#ff5555; }
    .bk-body { flex:1;overflow:auto;position:relative; }
    #bracket-canvas { display:block; }
    .bk-footer { padding:8px 16px;background:#060610;border-top:1px solid #1a3a2a;font-size:12px;color:#668877;display:flex;gap:12px;align-items:center;flex-wrap:wrap; }
    .bk-bet-label { color:#88bbaa;font-weight:bold;margin-right:4px; }
    .bk-payout { font-weight:bold;margin-left:auto; }

    .bk-team-detail { position:absolute;top:10px;right:10px;width:200px;background:#0a0a18;border:1px solid #00ff88;border-radius:6px;padding:10px;z-index:10;box-shadow:0 2px 16px rgba(0,255,136,0.2); }
    .bk-detail-header { color:#00ff88;font-weight:bold;font-size:14px;font-family:'Lato',sans-serif;margin-bottom:6px;letter-spacing:0.5px; }
    .bk-detail-row { display:flex;justify-content:space-between;font-size:12px;color:#88bbaa;padding:2px 0; }
    .bk-detail-label { font-size:12px;font-family:'Lato',sans-serif;color:#446666;margin-top:6px;text-transform:uppercase;letter-spacing:1px; }
    .bk-detail-path { font-size:12px;padding:1px 0; }

    .news-item {
      display: flex;
      align-items: flex-start;
      gap: 5px;
      padding: 3px 0;
      font-size: 12px;
      font-family: 'Lato', sans-serif;
      line-height: 1.3;
      border-bottom: 1px solid #0a1510;
      transition: opacity 0.3s;
    }
    .news-item:last-child { border-bottom: none; }
    .news-icon { flex-shrink: 0; font-size: 12px; line-height: 1.3; }
    .news-text { color: #88aa99; flex: 1; }
    .news-active { flex-shrink: 0; font-size: 12px; line-height: 1.6; animation: newsPulse 1.5s ease-in-out infinite; }
    @keyframes newsPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .portfolio-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #668877;
      padding: 2px 0;
    }
    .portfolio-row .shares { color: #88bbaa; }
    .portfolio-row .value { color: #44dd88; }

    /* --- Main Panel (editor + bottom) --- */
    #main-panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    #editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: #0d0d18;
      border-bottom: 1px solid #1a3a2a;
      font-size: 12px;
      flex-shrink: 0;
    }
    #editor-header .title { color: #668877; }
    #editor-header .title span { color: #00ff88; }
    #run-btn {
      background: #00aa55;
      border: none;
      color: #000;
      padding: 5px 18px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: bold;
      border-radius: 3px;
      letter-spacing: 1px;
    }
    #run-btn:hover { background: #00cc66; }

    #editor-container {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }
    #editor-container .cm-editor { height: 100%; font-size: 13px; }
    #editor-container .cm-editor .cm-scroller { overflow: auto; }

    /* --- Bottom strip: viewport + console --- */
    #bottom-strip {
      display: flex;
      height: 250px;
      flex-shrink: 0;
      border-top: 1px solid #1a3a2a;
    }

    #viewport {
      position: relative;
      overflow: hidden;
      background: #050510;
      flex: 1;
      min-width: 0;
      border-right: 1px solid #1a3a2a;
      display: flex;
      flex-direction: column;
    }
    #chart-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 4px;
      background: #060610;
      border-bottom: 1px solid #1a3a2a;
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: 2px;
    }
    #stock-chart-canvas { flex: 1; width: 100%; display: block; min-height: 0; overflow: hidden; }
    #chart-controls {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    #chart-controls button {
      background: #0a1a12;
      border: 1px solid #1a3a2a;
      color: #668877;
      font-family: inherit;
      font-size: 12px;
      padding: 3px 10px;
      cursor: pointer;
      border-radius: 2px;
    }
    #chart-controls button.active { color: #00ff88; border-color: #00ff88; }
    #chart-controls button:hover { color: #00ff88; }
    #stock-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
    }
    #stock-selector button {
      background: #0a1220;
      border: 1px solid #1a2a3a;
      color: #446688;
      font-family: inherit;
      font-size: 12px;
      padding: 2px 6px;
      cursor: pointer;
      border-radius: 2px;
      line-height: 1.3;
    }
    #stock-selector button.active { color: #00ff88; border-color: #00ff88; background: #0a2a18; }
    #stock-selector button:hover { color: #00ff88; }
    #game-canvas { display: none; }

    #console-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #console-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 10px;
      background: #080810;
      border-bottom: 1px solid #111;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #336655;
      flex-shrink: 0;
    }
    #console-header button {
      background: none;
      border: 1px solid #1a3a2a;
      color: #336655;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      padding: 1px 8px;
      border-radius: 2px;
    }
    #console-header button:hover { color: #00ff88; border-color: #00ff88; }

    #console-panel {
      flex: 1;
      background: #000;
      overflow-y: auto;
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1.5;
      scrollbar-width: thin;
      scrollbar-color: #1a3a2a #000;
    }
    #console-panel .log { color: #88ccaa; }
    #console-panel .error { color: #ff5555; }
    #console-panel .system { color: #557799; }
    #console-panel .result { color: #00ff88; font-weight: bold; }

    /* ========== TABLET ========== */
    @media (max-width: 1024px) {
      #app {
        grid-template-columns: 200px 1fr;
      }
      #viewport { width: 200px; }
      #bottom-strip { height: 180px; }
    }

    /* ========== MOBILE: tabbed ========== */
    @media (max-width: 640px) {
      #app {
        display: flex;
        flex-direction: column;
        grid-template-columns: unset;
        grid-template-rows: unset;
      }
      #tab-bar { display: flex; }

      #sidebar, #main-panel {
        display: none;
        flex: 1;
        min-height: 0;
        border: none;
      }
      #sidebar.active-tab {
        display: flex;
      }
      /* On mobile, main-panel is always flex but we hide/show children */
      #main-panel.active-tab-code,
      #main-panel.active-tab-output {
        display: flex;
      }

      /* In code mode: show editor, hide bottom strip */
      #main-panel.active-tab-code #editor-header,
      #main-panel.active-tab-code #editor-container { display: flex; }
      #main-panel.active-tab-code #editor-container { flex: 1; }
      #main-panel.active-tab-code #bottom-strip { display: none; }

      /* In output mode: hide editor, show bottom strip full height */
      #main-panel.active-tab-output #editor-header { display: none; }
      #main-panel.active-tab-output #editor-container { display: none; }
      #main-panel.active-tab-output #bottom-strip {
        flex: 1;
        flex-direction: column;
        height: auto;
      }
      #main-panel.active-tab-output #viewport {
        width: 100%;
        height: 280px;
        max-height: 280px;
        border-right: none;
        border-bottom: 1px solid #1a3a2a;
        flex: none;
      }
      #main-panel.active-tab-output #console-area {
        flex: 1;
      }
      /* Mobile toolbar wraps tighter */
      #chart-toolbar { padding: 2px 4px; }
      #stock-selector button { padding: 3px 6px; }

      #sidebar { border-right: none; }
      .sb-header { font-size: 14px; padding: 8px 12px; }
      .sidebar-btn { padding: 10px 12px; font-size: 13px; }
      .stat-row { font-size: 13px; padding: 3px 0; }
      .stock-row { font-size: 12px; padding: 4px 0; }
      .stock-row .sym { width: 60px; }

      #console-panel { min-height: 100px; }
      #editor-container .cm-editor { font-size: 14px; }
      #run-btn { padding: 8px 24px; font-size: 13px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="tab-bar">
      <button class="active" data-tab="sidebar">Status</button>
      <button data-tab="code">Code</button>
      <button data-tab="output">Output</button>
    </div>
    <div id="sidebar" class="active-tab"></div>
    <div id="main-panel" class="active-tab">
      <div id="editor-header">
        <span class="title"><span>program.js</span> — Ctrl+Enter to run</span>
        <button id="run-btn">RUN</button>
      </div>
      <div id="editor-container"></div>
      <div id="bottom-strip">
        <div id="viewport">
          <div id="chart-toolbar">
            <div id="stock-selector"></div>
            <div id="chart-controls">
              <button id="btn-tf-1m" class="active">1m</button>
              <button id="btn-tf-5m">5m</button>
              <button id="btn-tf-10m">10m</button>
              <span style="width:1px;background:#1a3a2a;margin:0 2px;"></span>
              <button id="btn-candle" class="active">Candle</button>
              <button id="btn-line">Line</button>
            </div>
          </div>
          <canvas id="stock-chart-canvas"></canvas>
          <canvas id="game-canvas"></canvas>
        </div>
        <div id="console-area">
          <div id="console-header">
            <span>Output</span>
            <button id="clear-console-btn">Clear</button>
          </div>
          <div id="console-panel"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
