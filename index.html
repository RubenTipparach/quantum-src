<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantumSrc — Build the Future</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; color: #00ff88; font-family: 'Courier New', monospace; font-size: 13px; }

    #app {
      display: grid;
      grid-template-columns: 220px 1fr 400px;
      grid-template-rows: 1fr;
      width: 100vw;
      height: 100vh;
    }

    /* --- Left Sidebar --- */
    #sidebar {
      background: #0d0d18;
      border-right: 1px solid #1a3a2a;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 10px;
      gap: 6px;
    }
    #sidebar h2 { font-size: 14px; color: #00ff88; margin: 8px 0 4px; border-bottom: 1px solid #1a3a2a; padding-bottom: 4px; }
    #sidebar .stat { color: #88ccaa; font-size: 12px; line-height: 1.6; }
    #sidebar .stat span { color: #00ff88; font-weight: bold; }
    .sidebar-btn {
      background: #0a1a12;
      border: 1px solid #1a3a2a;
      color: #00ff88;
      padding: 6px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      text-align: left;
      border-radius: 3px;
      transition: background 0.15s, border-color 0.15s;
    }
    .sidebar-btn:hover { background: #0f2a1a; border-color: #00ff88; }
    .sidebar-btn:active { background: #1a4a2a; }
    .sidebar-btn.disabled { opacity: 0.35; cursor: default; }
    .sidebar-section { display: flex; flex-direction: column; gap: 4px; }

    /* --- Center: 3D Viewport --- */
    #viewport {
      position: relative;
      overflow: hidden;
    }
    #game-canvas { width: 100%; height: 100%; display: block; }

    /* --- Right Panel: Editor + Console --- */
    #right-panel {
      display: flex;
      flex-direction: column;
      background: #0a0a12;
      border-left: 1px solid #1a3a2a;
    }

    #editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: #0d0d18;
      border-bottom: 1px solid #1a3a2a;
      font-size: 12px;
    }
    #editor-header .title { color: #00ff88; }
    #run-btn {
      background: #00aa55;
      border: none;
      color: #000;
      padding: 4px 14px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: bold;
      border-radius: 3px;
    }
    #run-btn:hover { background: #00cc66; }

    #editor-container {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }
    #editor-container .cm-editor {
      height: 100%;
    }
    #editor-container .cm-editor .cm-scroller {
      overflow: auto;
    }

    #console-panel {
      height: 200px;
      min-height: 100px;
      background: #000;
      border-top: 1px solid #1a3a2a;
      overflow-y: auto;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.5;
    }
    #console-panel .log { color: #88ccaa; }
    #console-panel .error { color: #ff5555; }
    #console-panel .system { color: #557799; }
    #console-panel .result { color: #00ff88; }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar"></div>
    <div id="viewport">
      <canvas id="game-canvas"></canvas>
    </div>
    <div id="right-panel">
      <div id="editor-header">
        <span class="title">program.js</span>
        <button id="run-btn">RUN</button>
      </div>
      <div id="editor-container"></div>
      <div id="console-panel"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
