<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuantumSrc — Build the Future</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a0a0f; color: #00ff88; font-family: 'Courier New', monospace; font-size: 13px; }

    #app {
      display: grid;
      grid-template-columns: 240px 1fr 420px;
      grid-template-rows: 1fr;
      width: 100vw;
      height: 100vh;
    }

    /* --- Left Sidebar --- */
    #sidebar {
      background: #0d0d18;
      border-right: 1px solid #1a3a2a;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 0;
      scrollbar-width: thin;
      scrollbar-color: #1a3a2a #0d0d18;
    }
    .sb-header {
      background: #060610;
      padding: 10px 12px;
      border-bottom: 1px solid #1a3a2a;
      font-size: 16px;
      font-weight: bold;
      color: #00ff88;
      letter-spacing: 2px;
    }
    .sb-section {
      padding: 8px 12px;
      border-bottom: 1px solid #0f1f18;
    }
    .sb-section h3 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #336655;
      margin-bottom: 6px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      font-size: 12px;
      color: #668877;
    }
    .stat-row .val { color: #00ff88; font-weight: bold; }
    .stat-row .val.money { color: #44dd88; }
    .stat-row .val.energy { color: #ffaa22; }
    .stat-row .val.era { color: #6688ff; }

    .stock-row {
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
      font-size: 11px;
      color: #668877;
    }
    .stock-row .sym { color: #88bbaa; font-weight: bold; width: 50px; }
    .stock-row .price { color: #44dd88; text-align: right; flex: 1; }
    .stock-row .change { text-align: right; width: 55px; font-size: 10px; }
    .stock-row .change.up { color: #00ff88; }
    .stock-row .change.down { color: #ff5555; }

    .sidebar-btn {
      display: block;
      width: 100%;
      background: #0a1a12;
      border: 1px solid #1a3a2a;
      color: #00ff88;
      padding: 7px 10px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      text-align: left;
      border-radius: 3px;
      margin-bottom: 4px;
      transition: background 0.15s, border-color 0.15s;
    }
    .sidebar-btn:hover { background: #0f2a1a; border-color: #00ff88; }
    .sidebar-btn:active { background: #1a4a2a; }

    .research-btn { font-size: 11px; }
    .research-btn .cost { color: #ffaa22; float: right; }
    .research-done {
      font-size: 10px;
      color: #334455;
      padding: 2px 0;
    }
    .research-locked {
      font-size: 10px;
      color: #1a2a22;
      padding: 2px 0;
    }

    .portfolio-row {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #668877;
      padding: 2px 0;
    }
    .portfolio-row .shares { color: #88bbaa; }
    .portfolio-row .value { color: #44dd88; }

    /* --- Center: 3D Viewport --- */
    #viewport {
      position: relative;
      overflow: hidden;
      background: #050510;
    }
    #game-canvas { width: 100%; height: 100%; display: block; }

    /* --- Right Panel: Editor + Console --- */
    #right-panel {
      display: flex;
      flex-direction: column;
      background: #0a0a12;
      border-left: 1px solid #1a3a2a;
    }

    #editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      background: #0d0d18;
      border-bottom: 1px solid #1a3a2a;
      font-size: 12px;
      flex-shrink: 0;
    }
    #editor-header .title { color: #668877; }
    #editor-header .title span { color: #00ff88; }
    #run-btn {
      background: #00aa55;
      border: none;
      color: #000;
      padding: 5px 18px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: bold;
      border-radius: 3px;
      letter-spacing: 1px;
    }
    #run-btn:hover { background: #00cc66; }

    #editor-container {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }
    #editor-container .cm-editor {
      height: 100%;
      font-size: 13px;
    }
    #editor-container .cm-editor .cm-scroller {
      overflow: auto;
    }

    /* Console */
    #console-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 10px;
      background: #080810;
      border-top: 1px solid #1a3a2a;
      border-bottom: 1px solid #111;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #336655;
      flex-shrink: 0;
    }
    #console-header button {
      background: none;
      border: 1px solid #1a3a2a;
      color: #336655;
      font-family: inherit;
      font-size: 10px;
      cursor: pointer;
      padding: 1px 8px;
      border-radius: 2px;
    }
    #console-header button:hover { color: #00ff88; border-color: #00ff88; }

    #console-panel {
      height: 200px;
      min-height: 80px;
      background: #000;
      overflow-y: auto;
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1.5;
      scrollbar-width: thin;
      scrollbar-color: #1a3a2a #000;
    }
    #console-panel .log { color: #88ccaa; }
    #console-panel .error { color: #ff5555; }
    #console-panel .system { color: #557799; }
    #console-panel .result { color: #00ff88; font-weight: bold; }
  </style>
</head>
<body>
  <div id="app">
    <div id="sidebar"></div>
    <div id="viewport">
      <canvas id="game-canvas"></canvas>
    </div>
    <div id="right-panel">
      <div id="editor-header">
        <span class="title"><span>program.js</span> — Ctrl+Enter to run</span>
        <button id="run-btn">RUN</button>
      </div>
      <div id="editor-container"></div>
      <div id="console-header">
        <span>Output</span>
        <button id="clear-console-btn">Clear</button>
      </div>
      <div id="console-panel"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
