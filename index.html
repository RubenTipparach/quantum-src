<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Quantum.src — Build the Future</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Lato:wght@400;700&family=Silkscreen&display=swap" rel="stylesheet">
  <style>
    /* ========== SKIN VARIABLES ========== */
    :root, [data-skin="hacker"] {
      --skin-bg-body: #0a0a0f;
      --skin-bg-sidebar: #0d0d18;
      --skin-bg-header: #060610;
      --skin-bg-viewport: #050510;
      --skin-bg-console: #000;
      --skin-bg-btn: #0a1a12;
      --skin-bg-btn-hover: #0f2a1a;
      --skin-bg-btn-active: #1a4a2a;
      --skin-bg-code: #0a1a15;
      --skin-bg-modal: #0a0a18;
      --skin-border: #1a3a2a;
      --skin-border-dim: #0f1f18;
      --skin-accent: #00ff88;
      --skin-accent-dim: #00aa55;
      --skin-text: #00ff88;
      --skin-text-bright: #aaccbb;
      --skin-text-light: #88bbaa;
      --skin-text-mid: #668877;
      --skin-text-dim: #446655;
      --skin-text-very-dim: #336655;
      --skin-money: #44dd88;
      --skin-credits: #aa88ff;
      --skin-info: #6688ff;
      --skin-energy: #ffaa22;
      --skin-error: #ff5555;
      --skin-run-bg: #00aa55;
      --skin-run-bg-hover: #00cc66;
      --skin-run-text: #000;
      --skin-font-main: 'IBM Plex Mono', 'Courier New', monospace;
      --skin-font-ui: 'Lato', sans-serif;
      --skin-radius: 3px;
      --skin-bevel: none;
      --skin-bevel-sunken: none;
      --skin-logo-gradient: linear-gradient(135deg, #00ff88 0%, #44ffaa 15%, #88ffcc 30%, #ffffff 45%, #88ccff 55%, #aa88ff 70%, #44ffaa 85%, #00ff88 100%);
      --skin-chart-bg: #050510;
      --skin-chart-grid: #0a1515;
      --skin-chart-grid-text: #334455;
      --skin-chart-bull: #00cc66;
      --skin-chart-bull-wick: #00aa55;
      --skin-chart-bear: #dd3333;
      --skin-chart-bear-wick: #aa2222;
      --skin-chart-volume: #1a3a2a;
      --skin-chart-volume-hi: #2a5a3a;
      --skin-chart-line: #00ff88;
      --skin-chart-line-fill: rgba(0, 255, 136, 0.08);
    }

    /* ===== WIN 95 SKIN ===== */
    [data-skin="win95"] {
      --skin-bg-body: #008080;
      --skin-bg-sidebar: #c0c0c0;
      --skin-bg-header: #000080;
      --skin-bg-viewport: #c0c0c0;
      --skin-bg-console: #fff;
      --skin-bg-btn: #c0c0c0;
      --skin-bg-btn-hover: #d4d0c8;
      --skin-bg-btn-active: #a0a0a0;
      --skin-bg-code: #fff;
      --skin-bg-modal: #c0c0c0;
      --skin-border: #808080;
      --skin-border-dim: #a0a0a0;
      --skin-accent: #000080;
      --skin-accent-dim: #000060;
      --skin-text: #000;
      --skin-text-bright: #000;
      --skin-text-light: #222;
      --skin-text-mid: #444;
      --skin-text-dim: #666;
      --skin-text-very-dim: #888;
      --skin-money: #008000;
      --skin-credits: #800080;
      --skin-info: #000080;
      --skin-energy: #808000;
      --skin-error: #ff0000;
      --skin-run-bg: #c0c0c0;
      --skin-run-bg-hover: #d4d0c8;
      --skin-run-text: #000;
      --skin-font-main: 'Pixelated MS Sans Serif', 'MS Sans Serif', Tahoma, Arial, sans-serif;
      --skin-font-ui: 'Pixelated MS Sans Serif', 'MS Sans Serif', Tahoma, Arial, sans-serif;
      --skin-radius: 0px;
      --skin-bevel: inset -1px -1px #000, inset 1px 1px #fff, inset -2px -2px #808080, inset 2px 2px #dfdfdf;
      --skin-bevel-sunken: inset -1px -1px #fff, inset 1px 1px #000, inset -2px -2px #dfdfdf, inset 2px 2px #808080;
      --skin-logo-gradient: none;
      --skin-chart-bg: #fff;
      --skin-chart-grid: #e0e0e0;
      --skin-chart-grid-text: #808080;
      --skin-chart-bull: #008000;
      --skin-chart-bull-wick: #006600;
      --skin-chart-bear: #cc0000;
      --skin-chart-bear-wick: #990000;
      --skin-chart-volume: #c0c0e0;
      --skin-chart-volume-hi: #a0a0d0;
      --skin-chart-line: #000080;
      --skin-chart-line-fill: rgba(0, 0, 128, 0.08);
    }

    /* ===== ASEPRITE SKIN ===== */
    [data-skin="aseprite"] {
      --skin-bg-body: #202125;
      --skin-bg-sidebar: #2c2c30;
      --skin-bg-header: #2c2c30;
      --skin-bg-viewport: #202125;
      --skin-bg-console: #1a1a1e;
      --skin-bg-btn: #3a3a40;
      --skin-bg-btn-hover: #48484e;
      --skin-bg-btn-active: #555560;
      --skin-bg-code: #2c2c30;
      --skin-bg-modal: #2c2c30;
      --skin-border: #1a1a1e;
      --skin-border-dim: #252528;
      --skin-accent: #e1b85f;
      --skin-accent-dim: #c4a04a;
      --skin-text: #c0c0c0;
      --skin-text-bright: #e0e0e0;
      --skin-text-light: #c0c0c0;
      --skin-text-mid: #909090;
      --skin-text-dim: #707070;
      --skin-text-very-dim: #585858;
      --skin-money: #82c764;
      --skin-credits: #b090d0;
      --skin-info: #6ca0d0;
      --skin-energy: #d4a84a;
      --skin-error: #d05050;
      --skin-run-bg: #e1b85f;
      --skin-run-bg-hover: #edc96f;
      --skin-run-text: #202125;
      --skin-font-main: 'Silkscreen', 'IBM Plex Mono', monospace;
      --skin-font-ui: 'Silkscreen', 'Lato', sans-serif;
      --skin-radius: 0px;
      --skin-bevel: none;
      --skin-bevel-sunken: none;
      --skin-logo-gradient: linear-gradient(135deg, #e1b85f 0%, #edc96f 50%, #e1b85f 100%);
      --skin-chart-bg: #202125;
      --skin-chart-grid: #2c2c30;
      --skin-chart-grid-text: #585858;
      --skin-chart-bull: #82c764;
      --skin-chart-bull-wick: #6aaa50;
      --skin-chart-bear: #d05050;
      --skin-chart-bear-wick: #a03030;
      --skin-chart-volume: #3a3a40;
      --skin-chart-volume-hi: #48484e;
      --skin-chart-line: #e1b85f;
      --skin-chart-line-fill: rgba(225, 184, 95, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: var(--skin-bg-body); color: var(--skin-text); font-family: var(--skin-font-main); font-size: 13px; }

    /* ========== DESKTOP: 2-column (sidebar | main) ========== */
    #app {
      display: grid;
      grid-template-columns: 240px 1fr;
      grid-template-rows: 1fr;
      width: 100vw;
      height: 100vh;
    }

    /* --- Mobile Tab Bar (hidden on desktop) --- */
    #tab-bar {
      display: none;
      background: var(--skin-bg-header);
      border-bottom: 1px solid var(--skin-border);
      flex-shrink: 0;
    }
    #tab-bar button {
      flex: 1;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--skin-text-very-dim);
      font-family: inherit;
      font-size: 12px;
      padding: 10px 0;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: color 0.15s, border-color 0.15s;
    }
    #tab-bar button.active { color: var(--skin-accent); border-bottom-color: var(--skin-accent); }
    #tab-bar button:hover { color: var(--skin-accent); }

    /* --- Left Sidebar --- */
    #sidebar {
      background: var(--skin-bg-sidebar);
      border-right: 1px solid var(--skin-border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0;
      position: relative;
      min-width: 240px;
    }
    .sb-header {
      background: var(--skin-bg-header);
      padding: 8px 10px;
      border-bottom: 1px solid var(--skin-border);
      font-size: 14px;
      font-weight: bold;
      letter-spacing: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      gap: 8px;
    }
    .sb-header > span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .sb-logo {
      background: var(--skin-logo-gradient);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: logo-shimmer 4s ease-in-out infinite;
      text-shadow: none;
      filter: drop-shadow(0 0 6px rgba(0,255,136,0.3)) drop-shadow(0 1px 0 rgba(0,0,0,0.5));
      font-size: 15px;
    }
    @keyframes logo-shimmer {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    /* Win95: no gradient, solid text color */
    [data-skin="win95"] .sb-logo {
      background: none;
      -webkit-background-clip: unset;
      background-clip: unset;
      -webkit-text-fill-color: #fff;
      animation: none;
      filter: none;
    }
    [data-skin="win95"] .sb-header {
      color: #fff;
    }
    .sb-settings-btn {
      background: none;
      border: 1px solid var(--skin-border);
      color: var(--skin-text-mid);
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: var(--skin-radius);
      line-height: 1;
    }
    .sb-settings-btn:hover { color: var(--skin-accent); border-color: var(--skin-accent); }
    [data-skin="win95"] .sb-settings-btn { color: #fff; border-color: rgba(255,255,255,0.3); }
    [data-skin="win95"] .sb-settings-btn:hover { color: #fff; border-color: #fff; }

    .sb-tabs {
      display: flex;
      flex-wrap: wrap;
      background: var(--skin-bg-header);
      border-bottom: 1px solid var(--skin-border);
      flex-shrink: 0;
    }
    .sb-tab {
      flex: 0 0 auto;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--skin-text-dim);
      font-family: inherit;
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .sb-tab:hover { color: var(--skin-text-light); }
    .sb-tab.active { color: var(--skin-accent); border-bottom-color: var(--skin-accent); }

    /* Win95 tabs look like classic property sheet tabs */
    [data-skin="win95"] .sb-tabs { background: var(--skin-bg-sidebar); }
    [data-skin="win95"] .sb-tab { color: #000; }
    [data-skin="win95"] .sb-tab.active { color: #000; border-bottom-color: #000080; }

    .sb-tab-content {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--skin-border) var(--skin-bg-sidebar);
    }

    .sb-resize-handle {
      position: absolute;
      top: 0;
      right: -3px;
      width: 6px;
      height: 100%;
      cursor: col-resize;
      z-index: 10;
    }
    .sb-resize-handle:hover { background: var(--skin-accent); opacity: 0.2; }
    .sb-section {
      padding: 12px 14px;
      border-bottom: 1px solid var(--skin-border-dim);
    }
    .sb-section h3 {
      font-size: 12px;
      font-family: var(--skin-font-ui);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--skin-text-very-dim);
      margin-bottom: 8px;
    }
    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 13px;
      color: var(--skin-text-mid);
    }
    .stat-row .val { color: var(--skin-accent); font-weight: bold; }
    .stat-row .val.money { color: var(--skin-money); }
    .stat-row .val.energy { color: var(--skin-energy); }
    .stat-row .val.era { color: var(--skin-info); }

    .stock-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      font-size: 13px;
      color: var(--skin-text-mid);
    }
    .stock-row .sym { color: var(--skin-text-light); font-weight: bold; width: 58px; flex-shrink: 0; }

    /* Docs tab */
    .docs-toc-link {
      display:flex; justify-content:space-between; align-items:center;
      padding:5px 8px; margin:1px 0; border-radius:var(--skin-radius);
      text-decoration:none; cursor:pointer; font-size:12px;
      border-left:2px solid transparent; transition: background 0.15s, border-color 0.15s;
    }
    .docs-toc-link:hover { background:var(--skin-bg-btn); border-left-color:var(--skin-text-light); }
    .docs-section p, .docs-intro { color:var(--skin-text-mid);font-family:var(--skin-font-ui);font-size:12px;line-height:1.5;margin-bottom:8px; }
    .docs-section code { background:var(--skin-bg-code);border:1px solid var(--skin-border);border-radius:var(--skin-radius);padding:1px 4px;color:var(--skin-accent);font-size:12px; }
    .docs-group { margin-bottom:12px;border-bottom:1px solid var(--skin-border-dim);padding-bottom:8px; }
    .docs-group h4 { color:var(--skin-info);font-family:var(--skin-font-ui);font-size:13px;margin-bottom:6px;letter-spacing:0.5px; }
    .docs-fn { margin-bottom:10px; }
    .docs-fn > code { display:inline-block;margin-bottom:3px;font-size:13px;font-weight:bold;cursor:pointer;transition:color 0.15s,border-color 0.15s; }
    .docs-fn > code:hover { color:var(--skin-text-bright);border-color:var(--skin-accent); }
    .docs-fn > code::after { content:' \229E';color:var(--skin-text-very-dim);font-size:12px;font-weight:normal; }
    .docs-fn > code:hover::after { color:var(--skin-accent); }
    .docs-fn > p { color:var(--skin-text-mid);font-family:var(--skin-font-ui);font-size:12px;margin:2px 0; }
    .docs-ret { color:var(--skin-text-dim);font-size:12px;margin-left:8px; }
    .docs-example { background:var(--skin-bg-viewport);border:1px solid var(--skin-border);border-radius:var(--skin-radius) var(--skin-radius) 0 0;padding:6px 8px;color:var(--skin-text-light);font-size:12px;line-height:1.5;overflow-x:auto;margin-top:4px;white-space:pre;font-family:var(--skin-font-main);border-bottom:none; }
    .docs-insert-btn { display:block;width:100%;background:var(--skin-bg-code);border:1px solid var(--skin-border);border-radius:0 0 var(--skin-radius) var(--skin-radius);color:var(--skin-text-dim);font-family:var(--skin-font-ui);font-size:12px;padding:4px 0;cursor:pointer;text-align:center;transition:color 0.15s,background 0.15s,border-color 0.15s;margin-bottom:6px; }
    .docs-insert-btn:hover { color:var(--skin-accent);background:var(--skin-bg-btn-hover);border-color:var(--skin-accent); }
    .docs-table { margin-top:6px;margin-bottom:6px; }
    .docs-table-row { display:flex;gap:12px;font-size:12px;color:var(--skin-text-mid);padding:2px 0; }
    .docs-table-row:first-child { color:var(--skin-text-light);font-weight:bold;border-bottom:1px solid var(--skin-border);margin-bottom:2px;padding-bottom:4px; }
    .docs-symbols { display:flex;flex-wrap:wrap;gap:6px; }
    .docs-symbols span { font-size:12px;color:var(--skin-text-mid);background:var(--skin-bg-code);border:1px solid var(--skin-border);border-radius:var(--skin-radius);padding:2px 6px; }
    .docs-symbols b { color:var(--skin-text-light); }

    /* Hoverable/tappable stock tag with tooltip */
    .stock-tag {
      position: relative;
      cursor: help;
      background: var(--skin-bg-code);
      border: 1px solid var(--skin-border);
      border-radius: var(--skin-radius);
      padding: 0 4px;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 0.5px;
      transition: border-color 0.15s, background 0.15s;
    }
    .stock-tag:hover {
      border-color: var(--skin-accent);
      background: var(--skin-bg-btn-hover);
    }
    .stock-tooltip {
      position: fixed;
      background: var(--skin-bg-modal);
      border: 1px solid var(--skin-accent);
      border-radius: var(--skin-radius);
      padding: 8px 10px;
      color: var(--skin-text-bright);
      font-size: 12px;
      font-family: var(--skin-font-ui);
      font-weight: normal;
      line-height: 1.4;
      width: 240px;
      z-index: 10000;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }
    .tooltip-close {
      position: absolute;
      top: 4px;
      right: 4px;
      background: none;
      border: none;
      color: var(--skin-text-mid);
      font-size: 16px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    .tooltip-close:hover { color: var(--skin-error); }
    .stock-row .price { color: var(--skin-money); text-align: right; flex: 1; font-weight: bold; }
    .stock-row .change { text-align: right; width: 60px; font-size: 12px; font-weight: bold; }
    .stock-row .change.up { color: var(--skin-accent); }
    .stock-row .change.down { color: var(--skin-error); }

    .sidebar-btn {
      display: block;
      width: 100%;
      background: var(--skin-bg-btn);
      border: 1px solid var(--skin-border);
      color: var(--skin-accent);
      padding: 9px 12px;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      text-align: left;
      border-radius: var(--skin-radius);
      margin-bottom: 5px;
      transition: background 0.15s, border-color 0.15s;
      box-shadow: var(--skin-bevel);
    }
    .sidebar-btn:hover { background: var(--skin-bg-btn-hover); border-color: var(--skin-accent); }
    .sidebar-btn:active { background: var(--skin-bg-btn-active); box-shadow: var(--skin-bevel-sunken); }

    .research-btn { font-size: 12px; position: relative; }
    .research-btn .cost { color: var(--skin-energy); float: right; }
    .research-btn .year-advance { display: block; font-size: 12px; color: var(--skin-info); margin-top: 2px; }
    .research-done { font-size: 12px; color: var(--skin-text-dim); padding: 4px 0; }
    .research-locked { font-size: 12px; color: var(--skin-text-dim); padding: 4px 0; }

    /* News modal */
    #news-modal, #settings-modal { position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;display:flex;align-items:center;justify-content:center; }
    .nm-backdrop { position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7); }
    .nm-content { position:relative;width:95%;max-width:700px;height:80%;background:var(--skin-bg-modal);border:1px solid var(--skin-border);border-radius:var(--skin-radius);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--skin-bevel); }
    .nm-header { display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--skin-bg-header);border-bottom:1px solid var(--skin-border);color:var(--skin-info);font-size:14px;font-weight:bold;font-family:var(--skin-font-ui);letter-spacing:0.5px; }
    [data-skin="win95"] .nm-header { color:#fff; }
    .nm-close { background:none;border:none;color:var(--skin-text-mid);font-size:24px;cursor:pointer;font-family:inherit; }
    .nm-close:hover { color:var(--skin-error); }
    [data-skin="win95"] .nm-close { color:#fff; }
    .nm-body { flex:1;overflow-y:auto;padding:8px 0; }
    .news-modal-item { padding:10px 16px;border-bottom:1px solid var(--skin-border-dim); }
    .news-modal-headline { font-size:13px;color:var(--skin-text-bright);font-family:var(--skin-font-ui);line-height:1.4;margin-bottom:4px; }
    .news-modal-meta { display:flex;gap:12px;font-size:12px;color:var(--skin-text-mid);margin-bottom:6px;flex-wrap:wrap;align-items:center; }
    .news-modal-impacts { display:flex;flex-wrap:wrap;gap:6px; }
    .news-stock-impact { font-size:12px;background:var(--skin-bg-code);border:1px solid var(--skin-border);border-radius:var(--skin-radius);padding:2px 6px;display:inline-flex;align-items:center;gap:4px; }

    /* Bracket modal */
    #bracket-modal { position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;display:flex;align-items:center;justify-content:center; }
    .bk-backdrop { position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7); }
    .bk-content { position:relative;width:95%;max-width:950px;height:85%;background:var(--skin-bg-modal);border:1px solid var(--skin-border);border-radius:var(--skin-radius);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--skin-bevel); }
    .bk-header { display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:var(--skin-bg-header);border-bottom:1px solid var(--skin-border);color:var(--skin-accent);font-size:13px;font-weight:bold;letter-spacing:1px; }
    [data-skin="win95"] .bk-header { color:#fff; }
    .bk-phase { font-size:12px;letter-spacing:0.5px;color:var(--skin-info); }
    [data-skin="win95"] .bk-phase { color:#c0c0ff; }
    .bk-close { background:none;border:none;color:var(--skin-text-mid);font-size:24px;cursor:pointer;font-family:inherit; }
    .bk-close:hover { color:var(--skin-error); }
    [data-skin="win95"] .bk-close { color:#fff; }
    .bk-body { flex:1;overflow:auto;position:relative; }
    #bracket-canvas { display:block; }
    .bk-footer { padding:8px 16px;background:var(--skin-bg-header);border-top:1px solid var(--skin-border);font-size:12px;color:var(--skin-text-mid);display:flex;gap:12px;align-items:center;flex-wrap:wrap; }
    .bk-bet-label { color:var(--skin-text-light);font-weight:bold;margin-right:4px; }
    .bk-payout { font-weight:bold;margin-left:auto; }

    .bk-team-detail { position:absolute;top:10px;right:10px;width:200px;background:var(--skin-bg-modal);border:1px solid var(--skin-accent);border-radius:var(--skin-radius);padding:10px;z-index:10;box-shadow:0 2px 16px rgba(0,0,0,0.3); }
    .bk-detail-header { color:var(--skin-accent);font-weight:bold;font-size:14px;font-family:var(--skin-font-ui);margin-bottom:6px;letter-spacing:0.5px; }
    .bk-detail-row { display:flex;justify-content:space-between;font-size:12px;color:var(--skin-text-light);padding:2px 0; }
    .bk-detail-label { font-size:12px;font-family:var(--skin-font-ui);color:var(--skin-text-dim);margin-top:6px;text-transform:uppercase;letter-spacing:1px; }
    .bk-detail-path { font-size:12px;padding:1px 0; }

    .news-item {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      padding: 5px 0;
      font-size: 13px;
      font-family: var(--skin-font-ui);
      line-height: 1.3;
      border-bottom: 1px solid var(--skin-border-dim);
      transition: opacity 0.3s;
    }
    .news-item:last-child { border-bottom: none; }
    .news-icon { flex-shrink: 0; font-size: 12px; line-height: 1.3; }
    .news-text { color: var(--skin-text-light); flex: 1; }
    .news-active { flex-shrink: 0; font-size: 12px; line-height: 1.6; animation: newsPulse 1.5s ease-in-out infinite; }
    @keyframes newsPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .portfolio-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--skin-text-mid);
      padding: 4px 0;
    }
    .portfolio-row .shares { color: var(--skin-text-light); }
    .portfolio-row .value { color: var(--skin-money); }

    /* --- Main Panel (editor + bottom) --- */
    #main-panel {
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
    }

    /* Top status bar */
    #top-status-bar {
      display: flex;
      gap: 16px;
      padding: 5px 12px;
      background: var(--skin-bg-header);
      border-bottom: 1px solid var(--skin-border);
      font-size: 13px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    #ts-money { color: var(--skin-money); font-weight: bold; }
    #ts-credits { color: var(--skin-credits); }
    #ts-year { color: var(--skin-info); }
    #ts-era { color: var(--skin-text-dim); }

    #editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px;
      background: var(--skin-bg-sidebar);
      border-bottom: 1px solid var(--skin-border);
      font-size: 13px;
      flex-shrink: 0;
    }
    #editor-file-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #current-file-name { color: var(--skin-accent); font-weight: bold; }
    #script-actions {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .script-action-btn {
      background: none;
      border: 1px solid var(--skin-border);
      color: var(--skin-text-dim);
      font-family: inherit;
      font-size: 14px;
      padding: 3px 8px;
      cursor: pointer;
      border-radius: var(--skin-radius);
    }
    .script-action-btn:hover { color: var(--skin-accent); border-color: var(--skin-accent); }

    /* File manager modal */
    #file-manager-modal { position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;display:flex;align-items:center;justify-content:center; }
    .fm-file {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--skin-border-dim);
      cursor: pointer;
      transition: background 0.15s;
    }
    .fm-file:hover { background: var(--skin-bg-btn-hover); }
    .fm-file.active { background: var(--skin-bg-btn); border-left: 3px solid var(--skin-accent); }
    .fm-file-name { color: var(--skin-text-light); font-size: 13px; }
    .fm-file.active .fm-file-name { color: var(--skin-accent); font-weight: bold; }
    .fm-file-actions { display: flex; gap: 6px; }
    .fm-file-btn {
      background: none;
      border: 1px solid var(--skin-border);
      color: var(--skin-text-dim);
      font-size: 12px;
      padding: 2px 6px;
      cursor: pointer;
      border-radius: var(--skin-radius);
    }
    .fm-file-btn:hover { color: var(--skin-accent); border-color: var(--skin-accent); }
    .fm-file-btn.delete:hover { color: var(--skin-error); border-color: var(--skin-error); }
    #run-btn {
      background: var(--skin-run-bg);
      border: none;
      color: var(--skin-run-text);
      padding: 5px 18px;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: bold;
      border-radius: var(--skin-radius);
      letter-spacing: 1px;
      box-shadow: var(--skin-bevel);
    }
    #run-btn:hover { background: var(--skin-run-bg-hover); }

    #editor-container {
      flex: 1;
      overflow: auto;
      min-height: 0;
    }
    #editor-container .cm-editor { height: 100%; font-size: 13px; }
    #editor-container .cm-editor .cm-scroller { overflow: auto; }

    /* --- Bottom strip: viewport + console --- */
    #bottom-strip {
      display: flex;
      height: 250px;
      flex-shrink: 0;
      border-top: 1px solid var(--skin-border);
    }

    #viewport {
      position: relative;
      overflow: hidden;
      background: var(--skin-bg-viewport);
      flex: 1;
      min-width: 0;
      border-right: 1px solid var(--skin-border);
      display: flex;
      flex-direction: column;
    }
    #chart-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3px 4px;
      background: var(--skin-bg-header);
      border-bottom: 1px solid var(--skin-border);
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: 2px;
    }
    #stock-chart-canvas { flex: 1; width: 100%; display: block; min-height: 0; overflow: hidden; }
    #chart-controls {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    #chart-controls button {
      background: var(--skin-bg-btn);
      border: 1px solid var(--skin-border);
      color: var(--skin-text-mid);
      font-family: inherit;
      font-size: 12px;
      padding: 3px 10px;
      cursor: pointer;
      border-radius: var(--skin-radius);
    }
    #chart-controls button.active { color: var(--skin-accent); border-color: var(--skin-accent); }
    #chart-controls button:hover { color: var(--skin-accent); }
    #stock-selector {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
    }
    #stock-selector button {
      background: var(--skin-bg-btn);
      border: 1px solid var(--skin-border);
      color: var(--skin-text-dim);
      font-family: inherit;
      font-size: 12px;
      padding: 2px 6px;
      cursor: pointer;
      border-radius: var(--skin-radius);
      line-height: 1.3;
    }
    #stock-selector button.active { color: var(--skin-accent); border-color: var(--skin-accent); background: var(--skin-bg-btn-hover); }
    #stock-selector button:hover { color: var(--skin-accent); }
    #game-canvas { display: none; }

    #console-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #console-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 10px;
      background: var(--skin-bg-header);
      border-bottom: 1px solid var(--skin-border);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--skin-text-very-dim);
      flex-shrink: 0;
    }
    #console-header button {
      background: none;
      border: 1px solid var(--skin-border);
      color: var(--skin-text-very-dim);
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      padding: 1px 8px;
      border-radius: var(--skin-radius);
    }
    #console-header button:hover { color: var(--skin-accent); border-color: var(--skin-accent); }

    #console-panel {
      flex: 1;
      background: var(--skin-bg-console);
      overflow-y: auto;
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1.5;
      scrollbar-width: thin;
      scrollbar-color: var(--skin-border) var(--skin-bg-console);
    }
    #console-panel .log { color: var(--skin-text-light); }
    #console-panel .error { color: var(--skin-error); }
    #console-panel .system { color: var(--skin-info); }
    #console-panel .result { color: var(--skin-accent); font-weight: bold; }

    /* ========== TABLET ========== */
    @media (max-width: 1024px) {
      #app {
        grid-template-columns: 200px 1fr;
      }
      #viewport { width: 200px; }
      #bottom-strip { height: 180px; }
    }

    /* ========== MOBILE: tabbed ========== */
    @media (max-width: 640px) {
      #app {
        display: flex;
        flex-direction: column;
        grid-template-columns: unset;
        grid-template-rows: unset;
      }
      #tab-bar { display: flex; }

      #sidebar, #main-panel {
        display: none;
        flex: 1;
        min-height: 0;
        border: none;
      }
      #sidebar.active-tab {
        display: flex;
      }
      /* On mobile, main-panel is always flex but we hide/show children */
      #main-panel.active-tab-code,
      #main-panel.active-tab-output {
        display: flex;
      }

      /* In code mode: show editor, hide bottom strip */
      #main-panel.active-tab-code #editor-header,
      #main-panel.active-tab-code #editor-container { display: flex; }
      #main-panel.active-tab-code #editor-container { flex: 1; }
      #main-panel.active-tab-code #bottom-strip { display: none; }

      /* In output mode: hide editor, show bottom strip full height */
      #main-panel.active-tab-output #editor-header { display: none; }
      #main-panel.active-tab-output #editor-container { display: none; }
      #main-panel.active-tab-output #bottom-strip {
        flex: 1;
        flex-direction: column;
        height: auto;
      }
      #main-panel.active-tab-output #viewport {
        width: 100%;
        height: 280px;
        max-height: 280px;
        border-right: none;
        border-bottom: 1px solid var(--skin-border);
        flex: none;
      }
      #main-panel.active-tab-output #console-area {
        flex: 1;
      }
      /* Mobile toolbar wraps tighter */
      #chart-toolbar { padding: 2px 4px; }
      #stock-selector button { padding: 3px 6px; }

      #sidebar { border-right: none; }
      .sb-header { font-size: 14px; padding: 8px 12px; }
      .sidebar-btn { padding: 10px 12px; font-size: 13px; }
      .stat-row { font-size: 13px; padding: 3px 0; }
      .stock-row { font-size: 12px; padding: 4px 0; }
      .stock-row .sym { width: 60px; }

      #console-panel { min-height: 100px; }
      #editor-container .cm-editor { font-size: 14px; }
      #run-btn { padding: 8px 24px; font-size: 13px; }
    }

    /* ========== WIN95 SKIN EXTRAS ========== */
    [data-skin="win95"] #sidebar { border-right: 2px solid #808080; box-shadow: var(--skin-bevel); }
    [data-skin="win95"] .sb-tab-content { scrollbar-width: auto; }
    [data-skin="win95"] #console-panel { color: #000; }
    [data-skin="win95"] #console-panel .log { color: #000; }
    [data-skin="win95"] #console-panel .system { color: #000080; }
    [data-skin="win95"] #console-panel .result { color: #008000; }
    [data-skin="win95"] #top-status-bar { background: var(--skin-bg-sidebar); border-bottom: 2px solid #808080; }
    [data-skin="win95"] .nm-content,
    [data-skin="win95"] .bk-content { border-radius: 0; border: 2px outset #dfdfdf; }
    [data-skin="win95"] #run-btn { box-shadow: var(--skin-bevel); border: 1px solid #808080; }
    [data-skin="win95"] #run-btn:active { box-shadow: var(--skin-bevel-sunken); }
    [data-skin="win95"] .sidebar-btn { color: #000; }
    [data-skin="win95"] #editor-header { background: var(--skin-bg-sidebar); }

    /* Win95: Blue gradient title bars */
    [data-skin="win95"] .sb-header {
      background: linear-gradient(90deg, #000080, #1084d0);
      color: #fff;
      font-weight: bold;
    }
    [data-skin="win95"] .nm-header,
    [data-skin="win95"] .bk-header,
    [data-skin="win95"] .rm-header {
      background: linear-gradient(90deg, #000080, #1084d0);
      color: #fff;
    }
    [data-skin="win95"] #chart-toolbar { background: var(--skin-bg-sidebar); }
    [data-skin="win95"] #console-header { background: var(--skin-bg-sidebar); color: #000; }

    /* Win95: Most text should be plain black — no colored accents */
    [data-skin="win95"] .sb-section h3 { color: #000; }
    [data-skin="win95"] .stat-row { color: #000; }
    [data-skin="win95"] .stat-row .val { color: #000; font-weight: bold; }
    [data-skin="win95"] .stat-row .val.money { color: #000; }
    [data-skin="win95"] .stat-row .val.energy { color: #000; }
    [data-skin="win95"] .stat-row .val.era { color: #000; }
    [data-skin="win95"] #ts-money { color: #000; }
    [data-skin="win95"] #ts-credits { color: #000; }
    [data-skin="win95"] #ts-year { color: #000; }
    [data-skin="win95"] #ts-era { color: #000; }
    [data-skin="win95"] #current-file-name { color: #000; }
    [data-skin="win95"] .stock-row { color: #000; }
    [data-skin="win95"] .stock-row .sym { color: #000; }
    [data-skin="win95"] .news-text { color: #000; }
    [data-skin="win95"] .news-icon { color: #000; }
    [data-skin="win95"] .portfolio-row { color: #000; }
    [data-skin="win95"] .portfolio-row .shares { color: #000; }
    [data-skin="win95"] .portfolio-row .value { color: #000; font-weight: bold; }
    [data-skin="win95"] .research-done { color: #000 !important; }
    [data-skin="win95"] .docs-section p,
    [data-skin="win95"] .docs-intro { color: #000; }
    [data-skin="win95"] .docs-group h4 { color: #000; font-weight: bold; }
    [data-skin="win95"] .docs-fn > p { color: #000; }
    [data-skin="win95"] .docs-ret { color: #444; }
    [data-skin="win95"] .docs-fn > code { color: #000; }
    [data-skin="win95"] .docs-section code { color: #000; background: #fff; border-color: #808080; }
    [data-skin="win95"] .docs-toc-link span { color: #000 !important; }
    [data-skin="win95"] .sb-tab { color: #000; }
    [data-skin="win95"] .sb-tab.active { color: #000; border-bottom-color: #000080; }
    [data-skin="win95"] .script-action-btn { color: #000; }
    [data-skin="win95"] .fm-file-name { color: #000; }
    [data-skin="win95"] #chart-controls button { color: #000; }
    [data-skin="win95"] #stock-selector button { color: #000; }
    /* Keep green/red ONLY for stock price changes */
    [data-skin="win95"] .stock-row .price { color: #000; }
    [data-skin="win95"] .stock-row .change.up { color: #008000; }
    [data-skin="win95"] .stock-row .change.down { color: #cc0000; }

    /* ========== ASEPRITE SKIN EXTRAS ========== */
    [data-skin="aseprite"] .sb-logo {
      filter: none;
    }
    [data-skin="aseprite"] .sb-section h3 {
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 10px;
    }
    [data-skin="aseprite"] #run-btn { border: 1px solid #1a1a1e; }
  </style>
</head>
<body>
  <div id="app">
    <div id="tab-bar">
      <button class="active" data-tab="sidebar">Status</button>
      <button data-tab="code">Code</button>
      <button data-tab="output">Output</button>
    </div>
    <div id="sidebar" class="active-tab"></div>
    <div id="main-panel" class="active-tab">
      <div id="top-status-bar">
        <span id="ts-money">$1,000</span>
        <span id="ts-credits">0 credits</span>
        <span id="ts-year">1983</span>
        <span id="ts-era">Dawn of Computing</span>
      </div>
      <div id="editor-header">
        <div id="editor-file-info">
          <button id="btn-file-manager" class="script-action-btn" title="File Manager">&#128193;</button>
          <span id="current-file-name">program.js</span>
        </div>
        <div id="script-actions">
          <button id="run-btn">RUN</button>
        </div>
      </div>
      <div id="editor-container"></div>
      <div id="bottom-strip">
        <div id="viewport">
          <div id="chart-toolbar">
            <div id="stock-selector"></div>
            <div id="chart-controls">
              <button id="btn-tf-1m" class="active">1m</button>
              <button id="btn-tf-5m">5m</button>
              <button id="btn-tf-10m">10m</button>
              <span style="width:1px;background:#1a3a2a;margin:0 2px;"></span>
              <button id="btn-candle" class="active">Candle</button>
              <button id="btn-line">Line</button>
            </div>
          </div>
          <canvas id="stock-chart-canvas"></canvas>
          <canvas id="game-canvas"></canvas>
        </div>
        <div id="console-area">
          <div id="console-header">
            <span>Output</span>
            <button id="clear-console-btn">Clear</button>
          </div>
          <div id="console-panel"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
